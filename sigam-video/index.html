<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SIGAM Video</title>
  <meta name="description" content="Hosted SIGAM video">
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #182233;
      --muted: #627083;
      --accent: #136f63;
      --accent-dark: #0d5149;
      --line: #d9e2ec;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 44px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: end;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 8px;
      border: 1px solid var(--line);
      color: var(--text);
      background: var(--panel);
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .player {
      background: #071412;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(24, 34, 51, 0.16);
    }

    video {
      display: block;
      width: 100%;
      max-height: 76vh;
      background: #071412;
    }

    .details {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 18px;
      margin-top: 20px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.2;
    }

    .panel p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }

    .qr {
      text-align: center;
    }

    .qr img {
      display: block;
      width: 100%;
      max-width: 184px;
      margin: 0 auto 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .url {
      direction: ltr;
      overflow-wrap: anywhere;
      color: var(--accent-dark);
      font-size: 14px;
    }

    @media (max-width: 760px) {
      header {
        align-items: stretch;
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }

      .details {
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div>
        <h1>SIGAM Video</h1>
        <p class="lead">Hosted video page for the uploaded MP4 file.</p>
      </div>
      <nav class="actions" aria-label="Video links">
        <a class="btn primary" href="../assets/sigam_vid_20260624_wa0002.mp4">Open MP4</a>
        <a class="btn" href="../assets/sigam-video-qr.png">Open QR code</a>
      </nav>
    </header>

    <section class="player" aria-label="Video player">
      <video controls preload="metadata" playsinline>
        <source src="../assets/sigam_vid_20260624_wa0002.mp4" type="video/mp4">
        Your browser does not support embedded video playback.
      </video>
    </section>

    <section class="details" aria-label="Video details">
      <div class="panel">
        <h2>Direct access</h2>
        <p>Use this page link for sharing or scan the QR code to open the video page directly on a phone.</p>
      </div>
      <div class="panel qr">
        <img src="../assets/sigam-video-qr.png" alt="QR code for the SIGAM video page">
        <p class="url">brahimkedjar.github.io/glowfit-download/sigam-video/</p>
      </div>
    </section>
  </main>
</body>
</html>
